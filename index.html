<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>نظام مواقف فوكالي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --bg: #05050a;
            --card-bg: rgba(22, 22, 36, 0.98);
            --primary: #ff9a3c;
            --accent: #00e5ff;
            --text: #ffffff;
            --text-muted: #a8a8b8;
            --danger: #ff4757;
            --success: #2ed573;
            --secondary: #ffa502;
        }
        body {
            font-family: 'Cairo', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #04040a, #0a0a18, #04040a);
            color: var(--text);
            min-height: 100vh;
            padding: 20px 14px;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 500px;
        }
        /* Selection Screen */
        .selection-screen {
            display: flex;
            flex-direction: column;
            gap: 24px;
            padding: 24px 10px;
        }
        .selection-screen h2 {
            text-align: center;
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }
        .selection-panels {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
        }
        .selection-panel {
            background: var(--card-bg);
            padding: 32px 20px;
            border-radius: 24px;
            border-top: 4px solid;
            border-top-color: var(--primary);
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 12px 40px rgba(0,0,0,0.6), 0 0 20px rgba(255, 154, 60, 0.15);
        }
        .selection-panel:hover { 
            transform: translateY(-5px) scale(1.02); 
            box-shadow: 0 20px 50px rgba(0,0,0,0.7), 0 0 30px rgba(255, 154, 60, 0.25); 
        }
        .selection-panel i {
            font-size: 50px;
            margin-bottom: 12px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .selection-panel h3 {
            font-size: 18px;
            font-weight: 900;
            margin-bottom: 8px;
        }
        .selection-panel p {
            font-size: 13px;
            color: var(--text-muted);
        }
        .selection-panel.vip { 
            border-top-color: var(--accent); 
            box-shadow: 0 12px 40px rgba(0,0,0,0.6), 0 0 20px rgba(0, 229, 255, 0.15); 
        }
        .selection-panel.vip:hover {
            box-shadow: 0 20px 50px rgba(0,0,0,0.7), 0 0 30px rgba(0, 229, 255, 0.25); 
        }
        /* Header */
        .header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 20px;
            padding: 16px 18px;
            background: linear-gradient(135deg, rgba(255, 154, 60, 0.18), rgba(0, 229, 255, 0.14));
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
        }
        .back-btn {
            padding: 10px 16px;
            border: none;
            background: rgba(255,255,255,0.1);
            border-radius: 14px;
            color: #fff;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            flex-shrink: 0;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
        }
        .back-btn:hover { background: rgba(255,255,255,0.18); transform: translateX(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.4); }
        .header h1 {
            flex: 1;
            text-align: center;
            font-size: 18px;
            font-weight: 900;
        }
        .refresh-btn {
            padding: 10px 16px;
            border: none;
            background: linear-gradient(135deg, var(--primary), #ff6b00);
            border-radius: 14px;
            color: #fff;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            flex-shrink: 0;
            box-shadow: 0 4px 16px rgba(255, 154, 60, 0.4);
        }
        .refresh-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 154, 60, 0.5); }
        /* Simple Overview */
        .simple-overview {
            display: flex;
            gap: 12px;
            margin-bottom: 22px;
        }
        .overview-card {
            flex: 1;
            background: var(--card-bg);
            padding: 18px 14px;
            border-radius: 18px;
            border-top: 4px solid;
            text-align: center;
            box-shadow: 0 10px 36px rgba(0,0,0,0.6);
        }
        .overview-card h3 {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 700;
        }
        .overview-card .number {
            font-size: 30px;
            font-weight: 900;
            font-family: 'Cairo', sans-serif;
        }
        /* Lot Cards */
        .lot-card {
            background: var(--card-bg);
            padding: 18px 16px;
            border-radius: 18px;
            margin-bottom: 14px;
            border-top: 4px solid rgba(255,255,255,0.08);
            box-shadow: 0 10px 36px rgba(0,0,0,0.55);
        }
        .lot-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            gap: 10px;
        }
        .lot-info .lot-name {
            font-size: 15px;
            font-weight: 800;
        }
        .lot-cap {
            font-size: 12px;
            font-weight: 800;
            color: #fff;
            background: linear-gradient(135deg, var(--accent), #00a8cc);
            padding: 8px 12px;
            border-radius: 12px;
            white-space: nowrap;
            box-shadow: 0 4px 16px rgba(0, 229, 255, 0.3);
        }
        /* Monitoring Controls */
        .lot-controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .btn-ctrl {
            flex: 0 0 52px;
            padding: 12px;
            border: none;
            border-radius: 14px;
            font-size: 22px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }
        .btn-minus { background: linear-gradient(135deg, #ff4757, #ff6b7a); }
        .btn-plus { background: linear-gradient(135deg, #2ed573, #3ce889); }
        .btn-ctrl:hover { transform: scale(1.08); }
        .btn-ctrl:active { transform: scale(0.95); }
        .num-input {
            flex: 1;
            text-align: center;
            font-size: 26px;
            font-weight: 900;
            font-family: 'Poppins', 'Cairo', sans-serif;
            padding: 12px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            border: 2px solid rgba(255, 255, 255, 0.12);
            color: #fff;
            outline: none;
            transition: all 0.2s ease;
        }
        .num-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(255, 154, 60, 0.25);
        }
        /* Calculation Stats */
        .calc-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 12px;
        }
        .calc-stat {
            padding: 12px 10px;
            border-radius: 12px;
            text-align: center;
            background: rgba(255,255,255,0.06);
            box-shadow: 0 4px 16px rgba(0,0,0,0.25);
        }
        .calc-stat h4 {
            font-size: 10px;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-weight: 700;
        }
        .calc-stat p {
            font-size: 18px;
            font-weight: 900;
        }
        .progress-bar {
            height: 16px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.4);
        }
        .progress-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.4s ease;
            box-shadow: 0 0 20px;
        }
        /* Actions */
        .actions {
            display: flex;
            gap: 14px;
            margin-top: 16px;
        }
        .btn-sync {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 16px;
            font-weight: 900;
            font-size: 16px;
            cursor: pointer;
            background: linear-gradient(135deg, #4a69bd, #6a89cc);
            color: #fff;
            box-shadow: 0 8px 28px rgba(74, 105, 189, 0.5);
            transition: all 0.3s ease;
        }
        .btn-sync:hover { transform: translateY(-2px); box-shadow: 0 12px 36px rgba(74, 105, 189, 0.6); }
        /* Loading & Toast */
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            right:0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 16px;
        }
        .loading.hide { display: none; }
        .spinner {
            width: 64px;
            height: 64px;
            border: 5px solid rgba(255,154,60,0.2);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 40px rgba(255, 154, 60, 0.5);
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--card-bg);
            color: #fff;
            padding: 16px 24px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 12px 44px rgba(0,0,0,0.7);
            font-weight: 900;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(-10px); }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <span>جاري الاتصال بقاعدة البيانات...</span>
    </div>

    <div class="container">
        <!-- Selection Screen -->
        <div class="selection-screen" id="selectionScreen">
            <h2><i class="fa-solid fa-car-side"></i> نظام مواقف فوكالي</h2>
            <div class="selection-panels">
                <div class="selection-panel" onclick="selectMode('monitoring')">
                    <i class="fa-solid fa-sliders"></i>
                    <h3>المراقبة</h3>
                    <p>تحديث الموقف</p>
                </div>
                <div class="selection-panel vip" onclick="selectMode('calculation')">
                    <i class="fa-solid fa-calculator"></i>
                    <h3>الحساب</h3>
                    <p>تفاصيل الحساب</p>
                </div>
            </div>
        </div>

        <!-- Main Content (shown after selection) -->
        <div id="mainContent" style="display: none;">
            <!-- Header -->
            <div class="header">
                <button class="back-btn" onclick="showSelection()">
                    <i class="fa-solid fa-arrow-left"></i> عودة
                </button>
                <h1 id="modeTitle">المراقبة</h1>
                <button class="refresh-btn" onclick="fetchFromFirebase()">
                    <i class="fa-solid fa-rotate"></i> تحديث
                </button>
            </div>

            <!-- Overview Cards -->
            <div class="simple-overview">
                <div class="overview-card" style="border-top-color: var(--primary);">
                    <h3>السيارات الحالية</h3>
                    <div class="number" id="totalCurrent" style="color: var(--primary);">0</div>
                </div>
                <div class="overview-card" style="border-top-color: var(--success);">
                    <h3>المتبقي</h3>
                    <div class="number" id="totalRemaining" style="color: var(--success);">0</div>
                </div>
                <div class="overview-card" style="border-top-color: var(--accent);">
                    <h3>الإشغال</h3>
                    <div class="number" id="totalOccupancy" style="color: var(--accent);">0%</div>
                </div>
            </div>

            <!-- Lots Container -->
            <div id="lotsContainer"></div>

            <!-- Actions (only in monitoring) -->
            <div class="actions" id="monitoringActions" style="display: none;">
                <button class="btn-sync" onclick="syncToFirebase()">
                    <i class="fa-solid fa-cloud-arrow-up"></i> حفظ
                </button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">✓ تم الحفظ بنجاح!</div>

    <script>
        const FIREBASE_URL = "https://vocaly-parking-default-rtdb.firebaseio.com/data.json";
        const parkingConfig = {
            'CP1': { name: 'المواقف العامة (CP1)', capacity: 50 },
            'CP2': { name: 'المواقف العامة (CP2)', capacity: 65 },
            'CP3': { name: 'المواقف العامة (CP3)', capacity: 400 },
            'VIP1': { name: 'مواقف كبار الشخصيات (VIP1)', capacity: 500 },
            'VIP2': { name: 'مواقف كبار الشخصيات (VIP2)', capacity: 150 }
        };

        let parkingLots = [
            { id: 'CP1', name: parkingConfig['CP1'].name, capacity: parkingConfig['CP1'].capacity, current: 0 },
            { id: 'CP2', name: parkingConfig['CP2'].name, capacity: parkingConfig['CP2'].capacity, current: 0 },
            { id: 'CP3', name: parkingConfig['CP3'].name, capacity: parkingConfig['CP3'].capacity, current: 0 },
            { id: 'VIP1', name: parkingConfig['VIP1'].name, capacity: parkingConfig['VIP1'].capacity, current: 0 },
            { id: 'VIP2', name: parkingConfig['VIP2'].name, capacity: parkingConfig['VIP2'].capacity, current: 0 }
        ];
        let currentMode = null;

        function selectMode(mode) {
            currentMode = mode;
            document.getElementById('modeTitle').innerText = mode === 'monitoring' ? 'المراقبة' : 'الحساب';
            document.getElementById('monitoringActions').style.display = mode === 'monitoring' ? 'flex' : 'none';
            document.getElementById('selectionScreen').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            renderUI();
        }

        function showSelection() {
            currentMode = null;
            document.getElementById('selectionScreen').style.display = 'flex';
            document.getElementById('mainContent').style.display = 'none';
        }

        function changeVal(id, amt) {
            let lot = parkingLots.find(l => l.id === id);
            if(lot && (lot.current + amt >= 0) && (lot.current + amt <= lot.capacity)) {
                lot.current += amt;
                renderUI();
            }
        }

        function updateInputVal(id, value) {
            let lot = parkingLots.find(l => l.id === id);
            if(lot) {
                let num = parseInt(value) || 0;
                if(num < 0) num = 0;
                if(num > lot.capacity) num = lot.capacity;
                lot.current = num;
                renderUI();
            }
        }

        function renderUI() {
            const container = document.getElementById('lotsContainer');
            container.innerHTML = '';
            
            let totalCur = 0, totalCap = 0;
            
            parkingLots.forEach(lot => {
                totalCur += lot.current;
                totalCap += lot.capacity;
                const pct = lot.capacity > 0 ? Math.round((lot.current / lot.capacity) * 100) : 0;
                const remaining = lot.capacity - lot.current;
                let statusColor = 'var(--success)';
                let gradientStart = 'var(--success)';
                let gradientEnd = '#1abc9c';
                if(pct >= 80) {
                    statusColor = 'var(--danger)';
                    gradientStart = 'var(--danger)';
                    gradientEnd = '#ff6b7a';
                } else if(pct >= 60) {
                    statusColor = 'var(--secondary)';
                    gradientStart = 'var(--secondary)';
                    gradientEnd = '#ffbb33';
                }

                if (currentMode === 'monitoring') {
                    container.insertAdjacentHTML('beforeend', `
                        <div class="lot-card">
                            <div class="lot-info">
                                <span class="lot-name">${lot.name}</span>
                                <span class="lot-cap">السعة: ${lot.capacity}</span>
                            </div>
                            <div class="lot-controls">
                                <button class="btn-ctrl btn-plus" onclick="changeVal('${lot.id}', 1)">
                                    <i class="fa-solid fa-plus"></i>
                                </button>
                                <input type="number" class="num-input" 
                                       value="${lot.current}" 
                                       min="0" max="${lot.capacity}"
                                       onchange="updateInputVal('${lot.id}', this.value)"
                                       inputmode="numeric">
                                <button class="btn-ctrl btn-minus" onclick="changeVal('${lot.id}', -1)">
                                    <i class="fa-solid fa-minus"></i>
                                </button>
                            </div>
                        </div>
                    `);
                } else {
                    container.insertAdjacentHTML('beforeend', `
                        <div class="lot-card">
                            <div class="lot-info">
                                <span class="lot-name">${lot.name}</span>
                                <span class="lot-cap">السعة: ${lot.capacity}</span>
                            </div>
                            <div class="calc-stats">
                                <div class="calc-stat">
                                    <h4>السيارات</h4>
                                    <p style="color: var(--primary);">${lot.current.toLocaleString()}</p>
                                </div>
                                <div class="calc-stat">
                                    <h4>المتبقي</h4>
                                    <p style="color: ${statusColor};">${remaining.toLocaleString()}</p>
                                </div>
                                <div class="calc-stat">
                                    <h4>الإشغال</h4>
                                    <p style="color: ${statusColor};">${pct}%</p>
                                </div>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${pct}%; background: linear-gradient(90deg, ${gradientStart}, ${gradientEnd}); color: ${statusColor};"></div>
                            </div>
                        </div>
                    `);
                }
            });

            document.getElementById('totalCurrent').innerText = totalCur.toLocaleString();
            document.getElementById('totalRemaining').innerText = (totalCap - totalCur).toLocaleString();
            const totalPct = totalCap > 0 ? Math.round((totalCur / totalCap) * 100) : 0;
            document.getElementById('totalOccupancy').innerText = totalPct + '%';
        }

        async function fetchFromFirebase() {
            document.getElementById('loading').classList.remove('hide');
            try {
                let response = await fetch(FIREBASE_URL);
                let cloudData = await response.json();
                
                if (cloudData && Array.isArray(cloudData)) {
                    parkingLots = cloudData.map(item => ({
                        id: item.id,
                        name: parkingConfig[item.id].name,
                        capacity: parkingConfig[item.id].capacity,
                        current: item.current || 0
                    }));
                }
                renderUI();
            } catch (e) {
                renderUI();
            }
            document.getElementById('loading').classList.add('hide');
        }

        async function syncToFirebase() {
            let uploadData = parkingLots.map(l => ({ id: l.id, current: l.current }));
            try {
                let response = await fetch(FIREBASE_URL, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(uploadData)
                });
                const toast = document.getElementById('toast');
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2500);
            } catch(e) {
            }
        }

        // Keyboard back button support (Escape key)
        document.addEventListener('keydown', (e) => {
            if(e.key === 'Escape') {
                if(currentMode) {
                    showSelection();
                }
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            fetchFromFirebase();
        });
    </script>
</body>
</html>
